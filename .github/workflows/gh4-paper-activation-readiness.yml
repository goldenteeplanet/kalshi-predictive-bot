name: GH-4 Paper Activation Readiness

on:
  pull_request:
    paths:
      - ".env.example"
      - "README.md"
      - "docs/GH3_BLOCKER_SOURCE_AUDIT_20260721.md"
      - "docs/GH4_PAPER_ORDER_ACTIVATION.md"
      - "src/kalshi_predictor/cli.py"
      - "src/kalshi_predictor/config.py"
      - "src/kalshi_predictor/ingest/websocket_watch.py"
      - "src/kalshi_predictor/phase_gh2.py"
      - "src/kalshi_predictor/phase_gh4.py"
      - "src/kalshi_predictor/phase3ba_r2.py"
      - "src/kalshi_predictor/phase3ba_r3.py"
      - "src/kalshi_predictor/single_writer_coordinator.py"
      - "src/kalshi_predictor/ui/service.py"
      - "src/kalshi_predictor/ui/templates/today.html"
      - "src/kalshi_predictor/weather/providers.py"
      - "tests/**"
      - "scripts/cloud/verify-paper-deployment.sh"
      - "scripts/local/gh4-paper-lifecycle-rehearsal.sh"
      - ".github/workflows/gh4-paper-activation-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gh4-focused-safety:
    name: GH-4 gates, source recovery, and paper lifecycle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install local project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Check changed implementation quality
        run: >-
          python -m ruff check
          src/kalshi_predictor/phase_gh4.py
          src/kalshi_predictor/phase_gh2.py
          src/kalshi_predictor/phase3ba_r2.py
          src/kalshi_predictor/phase3ba_r3.py
          src/kalshi_predictor/single_writer_coordinator.py
          src/kalshi_predictor/ingest/websocket_watch.py
          src/kalshi_predictor/weather/providers.py
          tests/test_phase_gh4.py
          tests/test_phase_gh2.py
          tests/test_phase3ba_r2_weather_ranking_activation.py
          tests/test_phase3ba_r3_weather_paper_gate.py
          tests/test_cloud_deployment_smoke.py
          tests/test_single_writer_coordinator.py
          tests/test_gh1_websocket_watch.py
          tests/test_source_retries.py

      - name: Check legacy UI module without inherited line-length debt
        run: python -m ruff check --ignore E501 src/kalshi_predictor/ui/service.py

      - name: Check operator shell contracts
        run: >-
          bash -n
          scripts/cloud/kalshi-gh2-decision-refresh.sh
          scripts/cloud/verify-paper-deployment.sh
          scripts/local/gh4-paper-lifecycle-rehearsal.sh

      - name: Run GH-4 focused and paper lifecycle tests
        run: >-
          python -m pytest -q
          tests/test_phase_gh4.py
          tests/test_phase_gh2.py
          tests/test_phase3ba_r2_weather_ranking_activation.py
          tests/test_phase3ba_r3_weather_paper_gate.py
          tests/test_cloud_deployment_smoke.py
          tests/test_single_writer_coordinator.py
          tests/test_gh1_websocket_watch.py
          tests/test_source_retries.py
          tests/test_phase_3x_professional_ux.py
          tests/test_cli_smoke.py
          tests/test_paper_ledger_pnl.py
          tests/test_paper_strategy.py
          tests/test_phase_3m_dynamic_position_sizing.py
          tests/test_phase_3n_advanced_risk.py
          tests/test_phase_3y_settlement_link_remediation.py

  full-regression:
    name: Full repository regression
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install local project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run full test suite
        run: python -m pytest -q
