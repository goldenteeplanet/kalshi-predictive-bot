name: PROV-14B Offline Evidence Certification

on:
  pull_request:
    paths:
      - "src/kalshi_predictor/phase_prov14b_r2*.py"
      - "scripts/prov14b_r2*.py"
      - "tests/test_phase_prov14b_r2*.py"
      - ".github/workflows/prov14b-r2c-offline-certification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prov14b-offline-certification:
    name: Offline capture-to-certification gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install local project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run deterministic offline regression matrix
        run: >-
          python -m pytest
          tests/test_phase_prov14b_r2a.py
          tests/test_phase_prov14b_r2b.py
          tests/test_phase_prov14b_r2c.py
          -q

      - name: Run atomic capture-to-certification gate
        run: python scripts/prov14b_r2c_preview.py

      - name: Preserve combined certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prov14b-r2c-offline-certification
          path: reports/phase_prov14b_r2c/prov14b_r2c_ci_preview.json
          if-no-files-found: error
          retention-days: 30
