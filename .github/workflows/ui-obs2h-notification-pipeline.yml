name: UI Observation Notification Pipeline Certification

on:
  pull_request:
    paths:
      - "src/kalshi_predictor/ui/notification_*.py"
      - "scripts/ui_obs2*.py"
      - "tests/test_ui_obs2*.py"
      - "tests/golden/ui_obs2h_notification_pipeline_golden.json"
      - "reports/ui_obs2d/**"
      - "reports/ui_obs2e/**"
      - "reports/ui_obs2f/**"
      - "reports/ui_obs2g/**"
      - ".github/workflows/ui-obs2h-notification-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-obs2h-offline-certification:
    name: Offline notification-pipeline certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install local project
        run: python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run deterministic offline UI-OBS-2H gate
        run: >-
          python scripts/ui_obs2h_notification_pipeline_ci.py
          --reports-root reports
          --golden tests/golden/ui_obs2h_notification_pipeline_golden.json
          --output-dir reports/ui_obs2h

      - name: Preserve UI-OBS-2H certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-obs2h-notification-pipeline-certification
          path: reports/ui_obs2h/ui_obs2h_notification_pipeline_ci.json
          if-no-files-found: error
          retention-days: 30
