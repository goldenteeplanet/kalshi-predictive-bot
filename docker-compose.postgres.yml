services:
  postgres:
    image: postgres:16-alpine
    container_name: kalshi_predictive_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalshi_predictive_bot}
      POSTGRES_USER: ${POSTGRES_USER:-kalshi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalshi_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kalshi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-kalshi} -d ${POSTGRES_DB:-kalshi_predictive_bot}
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kalshi_postgres_data:
